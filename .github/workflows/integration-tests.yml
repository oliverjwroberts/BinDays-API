name: Integration Tests

env:
  DOTNET_VERSION: "10.0.x"

on:
  schedule:
    # Runs at 09:00 UTC every day to test collectors
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - BinDays.Api/**
      - BinDays.Api.Collectors/**
  pull_request:
    paths:
      - BinDays.Api/**
      - BinDays.Api.Collectors/**

permissions:
  checks: write
  contents: read

jobs:
  run_tests:
    name: Integration Tests
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Workaround for SSL error on self-hosted runner
        run: ./.github/scripts/integration-tests/ssl-workaround.sh

      - name: Determine test filter
        id: filter
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          FILTER=""
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            BASE_REF="origin/$GITHUB_BASE_REF"
            CHANGED_FILES=$(git diff --name-only "$BASE_REF" HEAD)

            COUNCIL_IMPL_PATTERN="^BinDays\.Api\.Collectors/Collectors/Councils/.*\.cs$"
            COUNCIL_TEST_PATTERN="^BinDays\.Api\.IntegrationTests/Collectors/Councils/.*Tests\.cs$"
            NON_COUNCIL_CHANGES=$(echo "$CHANGED_FILES" | grep -vE "$COUNCIL_IMPL_PATTERN|$COUNCIL_TEST_PATTERN" || true)

            if [[ -z "$NON_COUNCIL_CHANGES" && -n "$CHANGED_FILES" ]]; then
              IMPL_NAMES=$(echo "$CHANGED_FILES" | grep -E "$COUNCIL_IMPL_PATTERN" | sed 's|BinDays.Api.Collectors/Collectors/Councils/||' | sed 's|\.cs$||' || true)
              TEST_NAMES=$(echo "$CHANGED_FILES" | grep -E "$COUNCIL_TEST_PATTERN" | sed 's|BinDays.Api.IntegrationTests/Collectors/Councils/||' | sed 's|Tests\.cs$||' || true)
              COUNCILS=$(echo -e "$IMPL_NAMES\n$TEST_NAMES" | sort | uniq | grep -v "^$" || true)

              if [[ -n "$COUNCILS" ]]; then
                FILTER=$(echo "$COUNCILS" | sed 's/$/Tests/' | sed 's/^/FullyQualifiedName~/' | paste -sd '|')
                echo "PR optimization: only testing changed councils: $COUNCILS"
              fi
            fi
          fi
          echo "filter=$FILTER" >> $GITHUB_OUTPUT

      - name: Run integration tests
        continue-on-error: true
        env:
          BINDAYS_TEST_RETRIES: 1
        run: |
          FILTER="${{ steps.filter.outputs.filter }}"
          FILTER_ARG=""
          if [[ -n "$FILTER" ]]; then
            FILTER_ARG="--filter $FILTER"
          fi
          dotnet test $FILTER_ARG \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=detailed" \
            --results-directory TestResults \
            BinDays.Api.IntegrationTests/BinDays.Api.IntegrationTests.csproj

      - name: Parse test results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/integration-tests/parse-results.js');
            await script({ core });

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.json
          retention-days: 7

      - name: Test report annotations
        if: always()
        id: test-report
        uses: dorny/test-reporter@v1
        with:
          name: Council Test Results
          path: TestResults/results.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Fail if tests failed
        if: always() && steps.test-report.outputs.conclusion == 'failure'
        run: |
          echo "::error::Council test failures detected"
          exit 1

      - name: Update test badge
        if: always() && github.event_name != 'pull_request'
        env:
          GIST_ID: ${{ secrets.BADGE_GIST_ID }}
          GIST_TOKEN: ${{ secrets.BADGE_GIST_TOKEN }}
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --rawfile content badge.json '{files: {"integration-tests.json": {content: $content}}}')" \
            "https://api.github.com/gists/$GIST_ID"

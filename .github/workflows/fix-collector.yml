name: Fix Issue

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check_trigger:
    name: Check Trigger
    runs-on: ubuntu-latest
    if: |
      github.event.issue.pull_request == null &&
      github.event.comment.body == '/fix'
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      issue_number: ${{ steps.get_issue.outputs.issue_number }}
      issue_title: ${{ steps.get_issue.outputs.issue_title }}
      issue_body: ${{ steps.get_issue.outputs.issue_body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if comment author has write access
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/fix-collector/check-user-permission.js');
            await script({ github, context, core });

      - name: Get issue details
        id: get_issue
        if: steps.check.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/fix-collector/parse-issue-details.js');
            await script({ github, context, core });

      - name: Add reaction to comment
        if: steps.check.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

  fix_issue:
    name: Fix Issue
    needs: check_trigger
    if: needs.check_trigger.outputs.should_run == 'true'
    runs-on: self-hosted
    timeout-minutes: 60
    env:
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1

      - name: Restore dependencies
        run: dotnet restore

      - name: Install AI Tools
        uses: ./.github/actions/install-ai-tools
        with:
          codex_config: ${{ secrets.CODEX_CONFIG }}

      - name: Create output directory
        run: mkdir -p .agent/fix-collector

      - name: Write issue body to file
        run: |
          cat << 'ISSUE_EOF' > .agent/fix-collector/issue_body.txt
          ${{ needs.check_trigger.outputs.issue_body }}
          ISSUE_EOF

      - name: Setup PATH for Codex subshells
        run: |
          DOTNET_PATH=$(dirname "$(which dotnet)")
          echo "export PATH=\"$DOTNET_PATH:\$PATH\"" >> ~/.bashrc
          bash -lc 'dotnet --version'

      - name: Fix issue with Codex
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          ISSUE_TITLE: ${{ needs.check_trigger.outputs.issue_title }}
          ISSUE_NUMBER: ${{ needs.check_trigger.outputs.issue_number }}
          BINDAYS_ENABLE_HTTP_LOGGING: "true"
        run: ./.github/scripts/fix-collector/fix.sh

  report_failure:
    name: Report Failure
    needs: [check_trigger, fix_issue]
    if: failure() && needs.check_trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Comment on issue about failure
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ needs.check_trigger.outputs.issue_number }}
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const script = require('./.github/scripts/fix-collector/report-failure.js');
            await script({ github, context, core });
